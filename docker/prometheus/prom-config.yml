# Prometheus scrape configuration
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alerting rules (placeholder; configure Alertmanager when ready)
# rule_files:
#   - "alerts.yml"

scrape_configs:
  - job_name: "tiktok-agent"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "app:8000"
        labels:
          service: "tiktok-agent"
          env: "production"

  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"
